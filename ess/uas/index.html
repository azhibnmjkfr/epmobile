<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UAS Scores | ESS Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #234626;
      --primary-dark: #1a351d;
      --accent: #D4AF37;
      --bg-color: #F8FAFC;
      --text-main: #1E293B;
      --text-muted: #64748B;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      padding-bottom: 90px;
      min-height: 100vh;
    }

    /* Diagonal Stripes Background */
    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-color: #F8FAFC;
      background-image: 
        repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.02) 30px, rgba(35, 70, 38, 0.02) 31px),
        repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.015) 30px, rgba(35, 70, 38, 0.015) 31px);
    }

    /* Mobile Sticky Header */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      color: white;
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(-2px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }

    .header-logo img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .header-title {
      font-family: 'Poppins', sans-serif;
      color: white;
      font-weight: 600;
      font-size: 1rem;
    }

    .header-subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 0.7rem;
    }

    /* Page Title */
    .page-title {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
    }

    .page-title h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .page-title h1 i {
      color: var(--accent);
    }

    .page-title p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0;
    }

    /* Stats Container */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      max-width: 600px;
      margin: 0 auto 1.5rem;
      padding: 0 1rem;
    }

    .stat-card {
      background: white;
      padding: 1rem 0.75rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      text-align: center;
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      margin: 0 auto 0.5rem;
    }

    .stat-info h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0;
    }

    .stat-info p {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 0.25rem 0 0;
    }

    /* Filter Bar */
    .filter-bar {
      max-width: 600px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
    }

    .filter-card {
      background: white;
      padding: 0.75rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .filter-select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.8rem;
      background: white;
      width: 100%;
    }

    .filter-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .reset-btn {
      flex: 1;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: var(--primary-dark);
    }

    /* Table */
    .table-wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .table-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    thead {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    th {
      padding: 0.7rem 0.5rem;
      text-align: center;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.3px;
      font-family: 'Poppins', sans-serif;
    }

    td {
      padding: 0.6rem 0.5rem;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
      color: var(--text-main);
      font-size: 0.8rem;
    }

    tr:hover td {
      background-color: rgba(35, 70, 38, 0.03);
    }

    .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.75rem;
      display: inline-block;
    }

    .badge-class {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .score-high {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .score-mid {
      background: #fef9c3;
      color: #854d0e;
      border: 1px solid #fde047;
    }

    .score-low {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .status-lulus {
      background: #dcfce7;
      color: #15803d;
    }

    .status-remed {
      background: #ffedd5;
      color: #c2410c;
    }

    .status-gagal {
      background: #fee2e2;
      color: #b91c1c;
    }

    .last-update {
      text-align: center;
      margin-top: 1rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0 1rem;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0.25rem;
      box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
      z-index: 1000;
      border-top: 1px solid rgba(35, 70, 38, 0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.35rem 0.5rem;
      transition: all 0.2s;
      border-radius: 8px;
      min-width: 50px;
    }

    .nav-item i {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item.active i {
      color: var(--primary);
    }

    .nav-item.ess-nav {
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      color: var(--primary-dark);
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      margin-top: -0.5rem;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }

    .nav-item.ess-nav i {
      color: var(--primary-dark);
    }

    .nav-item:hover:not(.ess-nav) {
      background: rgba(35, 70, 38, 0.05);
      color: var(--primary);
    }

    /* WhatsApp FAB */
    .wa-fab {
      position: fixed;
      bottom: 90px;
      right: 1rem;
      width: 48px;
      height: 48px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
      z-index: 999;
      transition: all 0.2s;
    }

    .wa-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    @media (max-width: 400px) {
      .stats-container {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      
      .stat-card {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-align: left;
        padding: 0.75rem;
      }
      
      .stat-icon {
        margin: 0;
      }
      
      .stat-info h3 {
        font-size: 1.1rem;
      }
      
      .filter-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <a href="../../index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-logo">
      <img src="https://ui-avatars.com/api/?name=ESS&background=1a351d&color=D4AF37&size=32&bold=true" alt="ESS Logo">
      <div>
        <div class="header-title">ESS Dashboard</div>
        <div class="header-subtitle">MTsT Daarut Tahfizh Al-Ikhlas</div>
      </div>
    </div>
  </header>

  <!-- Page Title -->
  <div class="page-title">
    <h1><i class="fas fa-file-alt"></i> UAS Scores</h1>
    <p>Penilaian Akhir Semester Analysis</p>
  </div>

  <!-- Stats -->
  <div class="stats-container">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div class="stat-info">
        <h3 id="totalStudents">-</h3>
        <p>Students</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
      <div class="stat-info">
        <h3 id="averageScore">-</h3>
        <p>Average</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-trophy"></i></div>
      <div class="stat-info">
        <h3 id="highestScore">-</h3>
        <p>Highest</p>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-card">
      <div class="filter-grid">
        <select id="filterClass" class="filter-select">
          <option value="">All Classes</option>
        </select>
        <select id="filterRemedial" class="filter-select">
          <option value="">All Status</option>
          <option value="remedial">Remedial Needed</option>
          <option value="non-remedial">Passed</option>
        </select>
        <select id="filterSort" class="filter-select">
          <option value="">Sort by Final Score</option>
          <option value="desc">Highest First</option>
          <option value="asc">Lowest First</option>
        </select>
      </div>
      <div class="filter-actions">
        <button id="resetFilters" class="reset-btn">
          <i class="fas fa-redo"></i> Reset Filters
        </button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div class="table-container">
      <table id="nilaiTable">
        <thead>
          <tr>
            <th>ID</th>
            <th style="min-width:100px;">Name</th>
            <th>Class</th>
            <th>UAS</th>
            <th>Remedial</th>
            <th>Final</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="7" style="text-align:center; padding:2rem; color:var(--text-muted);">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="last-update">Last Update: <span id="lastUpdate">-</span></p>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="../../../eduportal-mobile.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="../../../jurnal-kelas.html" class="nav-item">
      <i class="fas fa-book-open"></i>
      <span>Jurnal</span>
    </a>
    <a href="../../../morphea-index.html" class="nav-item">
      <i class="fas fa-images"></i>
      <span>Morphea</span>
    </a>
    <a href="../../index.html" class="nav-item ess-nav active">
      <i class="fas fa-chart-bar"></i>
      <span>ESS</span>
    </a>
    <a href="../../../pts/index.html" class="nav-item">
      <i class="fas fa-clipboard-list"></i>
      <span>Assess</span>
    </a>
  </nav>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/6281234567890" target="_blank" class="wa-fab" title="Hubungi via WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1N-docAeezSqzkQcTk8mcPm-qMf-EisMELs_N35zAaT8/gviz/tq?tqx=out:csv&sheet=%F0%9F%93%9A%20uas_scores";
    const filterClass = document.getElementById("filterClass");
    const filterRemedial = document.getElementById("filterRemedial");
    const filterSort = document.getElementById("filterSort");
    const resetBtn = document.getElementById("resetFilters");
    const tableBody = document.getElementById("tableBody");
    const totalStudents = document.getElementById("totalStudents");
    const averageScore = document.getElementById("averageScore");
    const highestScore = document.getElementById("highestScore");
    const lastUpdate = document.getElementById("lastUpdate");
    let allData = [];

    function parseCSV(csvText) {
      const rows = [];
      let currentRow = [];
      let inQuotes = false;
      let currentValue = "";
      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if (char === '\n' && !inQuotes) {
          currentRow.push(currentValue.trim());
          rows.push(currentRow);
          currentRow = [];
          currentValue = "";
        } else if (char === '\r' && csvText[i + 1] === '\n' && !inQuotes) {
          currentRow.push(currentValue.trim());
          rows.push(currentRow);
          currentRow = [];
          currentValue = "";
          i++;
        } else {
          currentValue += char;
        }
      }
      if (currentValue.trim() !== "") {
        currentRow.push(currentValue.trim());
        rows.push(currentRow);
      }
      return rows;
    }

    async function loadData() {
      try {
        const res = await fetch(SHEET_URL);
        const csv = await res.text();
        const rows = parseCSV(csv);
        allData = rows.slice(1).filter(r => r.length >= 7 && r[0]).map(row => ({
          studentCode: row[0].replace(/"/g, ""),
          studentName: row[1].replace(/"/g, ""),
          class: row[2].replace(/"/g, ""),
          uasScore: row[3].replace(/"/g, ""),
          remedial: row[4].replace(/"/g, ""),
          finalScore: row[5].replace(/"/g, ""),
          notes: row[6].replace(/"/g, "")
        }));
        renderTable(allData);
        fillDropdowns(allData);
        updateStatistics(allData);
        updateLastUpdate();
      } catch (e) {
        tableBody.innerHTML = `<tr><td colspan="7" style="color:red; text-align:center; padding:2rem;">Error loading data</td></tr>`;
      }
    }

    function getScoreBadge(score) {
      const n = parseFloat(score);
      if (isNaN(n)) return "";
      if (n >= 80) return "score-high";
      if (n >= 75) return "score-mid";
      return "score-low";
    }

    function getStatusBadge(notes) {
      const n = (notes || "").toLowerCase();
      if (n.includes("lulus")) return "<span class='status-badge status-lulus'>Passed</span>";
      if (n.includes("remedial")) return "<span class='status-badge status-remed'>Remedial</span>";
      return `<span class='status-badge status-gagal'>${notes}</span>`;
    }

    function renderTable(data) {
      tableBody.innerHTML = "";
      if (data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:2rem;">No data found</td></tr>`;
        return;
      }
      data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="font-family:monospace; color:var(--text-muted); font-size:0.75rem;">${item.studentCode}</td>
          <td style="font-weight:500; text-align:left;">${item.studentName}</td>
          <td><span class="badge badge-class">${item.class}</span></td>
          <td><span class="badge ${getScoreBadge(item.uasScore)}">${item.uasScore}</span></td>
          <td><span class="badge ${getScoreBadge(item.remedial)}">${item.remedial}</span></td>
          <td><span class="badge ${getScoreBadge(item.finalScore)}" style="font-size:0.85rem;">${item.finalScore}</span></td>
          <td>${getStatusBadge(item.notes)}</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function fillDropdowns(data) {
      const set = new Set(data.map(x => x.class).filter(Boolean));
      filterClass.innerHTML = '<option value="">All Classes</option>';
      Array.from(set).sort().forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        filterClass.appendChild(opt);
      });
    }

    function updateStatistics(data) {
      const scores = data.map(x => parseFloat(x.finalScore)).filter(v => !isNaN(v) && v > 0);
      totalStudents.textContent = data.length;
      averageScore.textContent = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '0.0';
      highestScore.textContent = scores.length ? Math.max(...scores).toFixed(1) : '0.0';
    }

    function updateLastUpdate() {
      const now = new Date();
      lastUpdate.textContent = now.toLocaleString('id-ID', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      });
    }

    function filterTable() {
      let filtered = [...allData];
      const c = (filterClass.value || "").toLowerCase();
      if (c) {
        filtered = filtered.filter(x => (x.class || "").toLowerCase() === c);
      }
      const r = (filterRemedial.value || "").toLowerCase();
      if (r === "remedial") {
        filtered = filtered.filter(x => (x.remedial && x.remedial !== '-') || (x.notes || "").toLowerCase().includes("remedial"));
      } else if (r === "non-remedial") {
        filtered = filtered.filter(x => (!x.remedial || x.remedial === '-') && !((x.notes || "").toLowerCase().includes("remedial")));
      }
      const s = filterSort.value;
      if (s) {
        filtered.sort((a, b) => {
          const A = parseFloat(a.finalScore) || 0;
          const B = parseFloat(b.finalScore) || 0;
          return s === "desc" ? B - A : A - B;
        });
      }
      renderTable(filtered);
      updateStatistics(filtered);
    }

    filterClass.addEventListener("change", filterTable);
    filterRemedial.addEventListener("change", filterTable);
    filterSort.addEventListener("change", filterTable);
    resetBtn.addEventListener("click", () => {
      filterClass.value = "";
      filterRemedial.value = "";
      filterSort.value = "";
      renderTable(allData);
      updateStatistics(allData);
    });

    loadData();
  </script>
</body>
</html>
