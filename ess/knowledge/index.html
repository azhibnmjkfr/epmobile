<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Scores | ESS Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #234626;
      --primary-dark: #1a351d;
      --accent: #D4AF37;
      --bg-color: #F8FAFC;
      --text-main: #1E293B;
      --text-muted: #64748B;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      padding-bottom: 90px;
      min-height: 100vh;
    }

    /* Diagonal Stripes Background */
    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-color: #F8FAFC;
      background-image: 
        repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.02) 30px, rgba(35, 70, 38, 0.02) 31px),
        repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.015) 30px, rgba(35, 70, 38, 0.015) 31px);
    }

    /* Mobile Sticky Header */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      color: white;
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(-2px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }

    .header-logo img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .header-title {
      font-family: 'Poppins', sans-serif;
      color: white;
      font-weight: 600;
      font-size: 1rem;
    }

    .header-subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 0.7rem;
    }

    /* Page Title */
    .page-title {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
    }

    .page-title h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .page-title h1 i {
      color: var(--accent);
    }

    .page-title p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0;
    }

    /* Stats Container */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      max-width: 600px;
      margin: 0 auto 1.5rem;
      padding: 0 1rem;
    }

    .stat-card {
      background: white;
      padding: 1rem 0.75rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      text-align: center;
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      margin: 0 auto 0.5rem;
    }

    .stat-info h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0;
    }

    .stat-info p {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 0.25rem 0 0;
    }

    /* Filter Bar */
    .filter-bar {
      max-width: 600px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
    }

    .filter-card {
      background: white;
      padding: 0.75rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .filter-select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.8rem;
      background: white;
      width: 100%;
    }

    .filter-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .reset-btn {
      flex: 1;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: var(--primary-dark);
    }

    /* Table */
    .table-wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .table-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    th {
      padding: 0.6rem 0.4rem;
      text-align: center;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.1);
      font-family: 'Poppins', sans-serif;
    }

    td {
      padding: 0.5rem 0.4rem;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
      color: var(--text-main);
      font-size: 0.8rem;
    }

    tr:hover td {
      background-color: rgba(35, 70, 38, 0.03);
    }

    .badge-class {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.7rem;
    }

    .badge-score {
      border: 1px solid #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75rem;
      display: inline-block;
      min-width: 28px;
    }

    .score-pass {
      background: #f0fdf4;
      color: #166534;
      border-color: #bbf7d0;
    }

    .score-fail {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .group-1 {
      background: rgba(35, 70, 38, 0.05);
    }

    .pts-col {
      background: var(--accent) !important;
      color: var(--primary-dark) !important;
    }

    .rph-col {
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%) !important;
      color: var(--primary-dark) !important;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0.25rem;
      box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
      z-index: 1000;
      border-top: 1px solid rgba(35, 70, 38, 0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.35rem 0.5rem;
      transition: all 0.2s;
      border-radius: 8px;
      min-width: 50px;
    }

    .nav-item i {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item.active i {
      color: var(--primary);
    }

    .nav-item.ess-nav {
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      color: var(--primary-dark);
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      margin-top: -0.5rem;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }

    .nav-item.ess-nav i {
      color: var(--primary-dark);
    }

    .nav-item:hover:not(.ess-nav) {
      background: rgba(35, 70, 38, 0.05);
      color: var(--primary);
    }

    /* WhatsApp FAB */
    .wa-fab {
      position: fixed;
      bottom: 90px;
      right: 1rem;
      width: 48px;
      height: 48px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
      z-index: 999;
      transition: all 0.2s;
    }

    .wa-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    /* Loading State */
    .loading-row td {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
    }

    @media (max-width: 400px) {
      .stats-container {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      
      .stat-card {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-align: left;
        padding: 0.75rem;
      }
      
      .stat-icon {
        margin: 0;
      }
      
      .stat-info h3 {
        font-size: 1.1rem;
      }
      
      .filter-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <a href="../../index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-logo">
      <img src="https://ui-avatars.com/api/?name=ESS&background=1a351d&color=D4AF37&size=32&bold=true" alt="ESS Logo">
      <div>
        <div class="header-title">ESS Dashboard</div>
        <div class="header-subtitle">MTsT Daarut Tahfizh Al-Ikhlas</div>
      </div>
    </div>
  </header>

  <!-- Page Title -->
  <div class="page-title">
    <h1><i class="fas fa-brain"></i> Knowledge Scores</h1>
    <p>Daily Tasks, Reviews, and Exams</p>
  </div>

  <!-- Stats -->
  <div class="stats-container">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div class="stat-info">
        <h3 id="totalStudents">-</h3>
        <p>Students</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
      <div class="stat-info">
        <h3 id="averageScore">-</h3>
        <p>Avg PTS</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-trophy"></i></div>
      <div class="stat-info">
        <h3 id="highestScore">-</h3>
        <p>Highest PTS</p>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-card">
      <div class="filter-grid">
        <select id="filterClass" class="filter-select">
          <option value="">All Classes</option>
        </select>
        <select id="filterPts" class="filter-select">
          <option value="">All PTS Scores</option>
          <option value="top10">Top 10 PTS</option>
          <option value="top20">Top 20 PTS</option>
        </select>
        <select id="filterRph" class="filter-select">
          <option value="">All RPH Scores</option>
          <option value="top10">Top 10 RPH</option>
          <option value="top20">Top 20 RPH</option>
        </select>
      </div>
      <div class="filter-actions">
        <button id="resetFilters" class="reset-btn">
          <i class="fas fa-redo"></i> Reset Filters
        </button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div class="table-container">
      <table id="nilaiTable">
        <thead>
          <tr>
            <th rowspan="2">ID</th>
            <th rowspan="2" style="min-width:120px;">Name</th>
            <th rowspan="2">Class</th>
            <th colspan="3" style="background:rgba(255,255,255,0.1);">Bab 1</th>
            <th colspan="3">Bab 2</th>
            <th colspan="3" style="background:rgba(255,255,255,0.1);">Bab 3</th>
            <th colspan="3">Bab 4</th>
            <th rowspan="2" class="pts-col">PTS</th>
            <th rowspan="2" class="rph-col">RPH</th>
          </tr>
          <tr>
            <th class="group-1">TSK</th>
            <th class="group-1">RES</th>
            <th class="group-1">EVA</th>
            <th>TSK</th>
            <th>RES</th>
            <th>EVA</th>
            <th class="group-1">TSK</th>
            <th class="group-1">RES</th>
            <th class="group-1">EVA</th>
            <th>TSK</th>
            <th>RES</th>
            <th>EVA</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row">
            <td colspan="17">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="../../../eduportal-mobile.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="../../../jurnal-kelas.html" class="nav-item">
      <i class="fas fa-book-open"></i>
      <span>Jurnal</span>
    </a>
    <a href="../../../morphea-index.html" class="nav-item">
      <i class="fas fa-images"></i>
      <span>Morphea</span>
    </a>
    <a href="../../index.html" class="nav-item ess-nav active">
      <i class="fas fa-chart-bar"></i>
      <span>ESS</span>
    </a>
    <a href="../../../pts/index.html" class="nav-item">
      <i class="fas fa-clipboard-list"></i>
      <span>Assess</span>
    </a>
  </nav>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/6281234567890" target="_blank" class="wa-fab" title="Hubungi via WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1N-docAeezSqzkQcTk8mcPm-qMf-EisMELs_N35zAaT8/gviz/tq?tqx=out:csv&sheet=%F0%9F%93%9A%20personal_knowledge";
    const filterClass = document.getElementById("filterClass");
    const filterPts = document.getElementById("filterPts");
    const filterRph = document.getElementById("filterRph");
    const resetBtn = document.getElementById("resetFilters");
    const tableBody = document.getElementById("tableBody");
    const totalStudents = document.getElementById("totalStudents");
    const averageScore = document.getElementById("averageScore");
    const highestScore = document.getElementById("highestScore");
    let allData = [];

    function parseCSV(csvText) {
      const rows = [];
      let currentRow = [];
      let inQuotes = false;
      let currentValue = "";
      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if (char === '\n' && !inQuotes) {
          currentRow.push(currentValue.trim());
          rows.push(currentRow);
          currentRow = [];
          currentValue = "";
        } else {
          currentValue += char;
        }
      }
      if (currentValue.trim() !== "") {
        currentRow.push(currentValue.trim());
        rows.push(currentRow);
      }
      return rows;
    }

    function getScoreClass(s) {
      const n = parseFloat(s);
      if (isNaN(n)) return "";
      return n >= 75 ? "score-pass" : "score-fail";
    }

    async function loadData() {
      try {
        const res = await fetch(SHEET_URL);
        const csv = await res.text();
        const rows = parseCSV(csv);
        allData = rows.slice(1).filter(r => r.length >= 17 && r[1]).map(row => ({
          studentCode: row[1].replace(/"/g, ""),
          studentName: row[2].replace(/"/g, ""),
          class: row[3].replace(/"/g, ""),
          bab1Tsk: row[4].replace(/"/g, ""),
          bab1Res: row[5].replace(/"/g, ""),
          bab1Eva: row[6].replace(/"/g, ""),
          bab2Tsk: row[7].replace(/"/g, ""),
          bab2Res: row[8].replace(/"/g, ""),
          bab2Eva: row[9].replace(/"/g, ""),
          bab3Tsk: row[10].replace(/"/g, ""),
          bab3Res: row[11].replace(/"/g, ""),
          bab3Eva: row[12].replace(/"/g, ""),
          bab4Tsk: row[13].replace(/"/g, ""),
          bab4Res: row[14].replace(/"/g, ""),
          bab4Eva: row[15].replace(/"/g, ""),
          pts: row[16].replace(/"/g, ""),
          rph: row[17] ? row[17].replace(/"/g, "") : "-"
        }));
        renderTable(allData);
        fillDropdowns(allData);
        updateStatistics(allData);
      } catch (e) {
        tableBody.innerHTML = `<tr><td colspan="17" style="color:red; text-align:center; padding:2rem;">Error loading data</td></tr>`;
      }
    }

    function renderTable(data) {
      tableBody.innerHTML = "";
      if (data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="17" style="text-align:center; padding:2rem;">No data found</td></tr>`;
        return;
      }
      data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="font-family:monospace; color:#64748b; font-size:0.75rem;">${item.studentCode}</td>
          <td style="font-weight:500; text-align:left; font-size:0.8rem;">${item.studentName}</td>
          <td><span class="badge-class">${item.class}</span></td>
          <td class="group-1"><span class="badge-score ${getScoreClass(item.bab1Tsk)}">${item.bab1Tsk}</span></td>
          <td class="group-1"><span class="badge-score ${getScoreClass(item.bab1Res)}">${item.bab1Res}</span></td>
          <td class="group-1"><span class="badge-score ${getScoreClass(item.bab1Eva)}">${item.bab1Eva}</span></td>
          <td><span class="badge-score ${getScoreClass(item.bab2Tsk)}">${item.bab2Tsk}</span></td>
          <td><span class="badge-score ${getScoreClass(item.bab2Res)}">${item.bab2Res}</span></td>
          <td><span class="badge-score ${getScoreClass(item.bab2Eva)}">${item.bab2Eva}</span></td>
          <td class="group-1"><span class="badge-score ${getScoreClass(item.bab3Tsk)}">${item.bab3Tsk}</span></td>
          <td class="group-1"><span class="badge-score ${getScoreClass(item.bab3Res)}">${item.bab3Res}</span></td>
          <td class="group-1"><span class="badge-score ${getScoreClass(item.bab3Eva)}">${item.bab3Eva}</span></td>
          <td><span class="badge-score ${getScoreClass(item.bab4Tsk)}">${item.bab4Tsk}</span></td>
          <td><span class="badge-score ${getScoreClass(item.bab4Res)}">${item.bab4Res}</span></td>
          <td><span class="badge-score ${getScoreClass(item.bab4Eva)}">${item.bab4Eva}</span></td>
          <td style="font-weight:700; color:var(--primary);">${item.pts}</td>
          <td style="font-weight:700; color:var(--primary);">${item.rph}</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function fillDropdowns(data) {
      const set = new Set(data.map(i => i.class).filter(Boolean));
      filterClass.innerHTML = '<option value="">All Classes</option>';
      Array.from(set).sort().forEach(c => {
        const o = document.createElement("option");
        o.value = c;
        o.textContent = c;
        filterClass.appendChild(o);
      });
    }

    function updateStatistics(data) {
      const scores = data.map(i => parseFloat(i.pts)).filter(s => !isNaN(s) && s > 0);
      totalStudents.textContent = data.length;
      averageScore.textContent = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
      highestScore.textContent = scores.length ? Math.max(...scores) : '-';
    }

    function filterTable() {
      let filtered = [...allData];
      const c = filterClass.value.toLowerCase();
      if (c) filtered = filtered.filter(i => i.class.toLowerCase() === c);
      const p = filterPts.value;
      if (p) {
        filtered = filtered.filter(i => parseFloat(i.pts) > 0).sort((a, b) => parseFloat(b.pts) - parseFloat(a.pts));
        filtered = filtered.slice(0, p === "top10" ? 10 : 20);
      }
      const r = filterRph.value;
      if (r) {
        filtered = filtered.filter(i => parseFloat(i.rph) > 0).sort((a, b) => parseFloat(b.rph) - parseFloat(a.rph));
        filtered = filtered.slice(0, r === "top10" ? 10 : 20);
      }
      renderTable(filtered);
      updateStatistics(filtered);
    }

    filterClass.addEventListener("change", filterTable);
    filterPts.addEventListener("change", filterTable);
    filterRph.addEventListener("change", filterTable);
    resetBtn.addEventListener("click", () => {
      filterClass.value = "";
      filterPts.value = "";
      filterRph.value = "";
      renderTable(allData);
      updateStatistics(allData);
    });

    loadData();
  </script>
</body>
</html>
