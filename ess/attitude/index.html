<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attitude Scores | ESS Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #234626;
      --primary-dark: #1a351d;
      --accent: #D4AF37;
      --bg-color: #F8FAFC;
      --text-main: #1E293B;
      --text-muted: #64748B;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      padding-bottom: 90px;
      min-height: 100vh;
    }

    /* Diagonal Stripes Background */
    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-color: #F8FAFC;
      background-image: 
        repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.02) 30px, rgba(35, 70, 38, 0.02) 31px),
        repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.015) 30px, rgba(35, 70, 38, 0.015) 31px);
    }

    /* Mobile Sticky Header */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      color: white;
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(-2px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }

    .header-logo img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .header-title {
      font-family: 'Poppins', sans-serif;
      color: white;
      font-weight: 600;
      font-size: 1rem;
    }

    .header-subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 0.7rem;
    }

    /* Page Title */
    .page-title {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
    }

    .page-title h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .page-title h1 i {
      color: var(--accent);
    }

    .page-title p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0;
    }

    /* Filter Bar */
    .filter-bar {
      max-width: 600px;
      margin: 0 auto 1rem;
      padding: 0 1rem;
    }

    .filter-card {
      background: white;
      padding: 0.75rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      display: flex;
      gap: 0.5rem;
    }

    .filter-select {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.8rem;
      background: white;
    }

    .reset-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: var(--primary-dark);
    }

    /* Table */
    .table-wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .table-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    thead {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    th {
      padding: 0.7rem 0.5rem;
      text-align: center;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.3px;
      font-family: 'Poppins', sans-serif;
    }

    td {
      padding: 0.6rem 0.5rem;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
      color: var(--text-main);
      font-size: 0.8rem;
    }

    tr:hover td {
      background-color: rgba(35, 70, 38, 0.03);
    }

    .badge-class {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.7rem;
    }

    /* Interactive Cells */
    .attitude-cell {
      background: #f0fdf4;
      color: #166534;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      border-radius: 4px;
      padding: 4px 8px;
    }

    .attitude-cell:hover {
      background: #dcfce7;
      transform: scale(1.02);
    }

    /* Modal Styling */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 400px;
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      border-top: 5px solid var(--accent);
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #94a3b8;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--primary);
    }

    .modal-header h3 {
      font-family: 'Poppins', sans-serif;
      color: var(--primary);
      font-size: 1.1rem;
      margin: 0 0 0.25rem;
    }

    .modal-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 1rem;
    }

    .modal-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .modal-list li {
      background: #f8fafc;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      margin-bottom: 0.4rem;
      border-left: 3px solid var(--primary);
      font-size: 0.85rem;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0.25rem;
      box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
      z-index: 1000;
      border-top: 1px solid rgba(35, 70, 38, 0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.35rem 0.5rem;
      transition: all 0.2s;
      border-radius: 8px;
      min-width: 50px;
    }

    .nav-item i {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item.active i {
      color: var(--primary);
    }

    .nav-item.ess-nav {
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      color: var(--primary-dark);
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      margin-top: -0.5rem;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }

    .nav-item.ess-nav i {
      color: var(--primary-dark);
    }

    .nav-item:hover:not(.ess-nav) {
      background: rgba(35, 70, 38, 0.05);
      color: var(--primary);
    }

    /* WhatsApp FAB */
    .wa-fab {
      position: fixed;
      bottom: 90px;
      right: 1rem;
      width: 48px;
      height: 48px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
      z-index: 999;
      transition: all 0.2s;
    }

    .wa-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    @media (max-width: 400px) {
      .filter-card {
        flex-direction: column;
      }
      
      .reset-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <a href="../../index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-logo">
      <img src="https://ui-avatars.com/api/?name=ESS&background=1a351d&color=D4AF37&size=32&bold=true" alt="ESS Logo">
      <div>
        <div class="header-title">ESS Dashboard</div>
        <div class="header-subtitle">MTsT Daarut Tahfizh Al-Ikhlas</div>
      </div>
    </div>
  </header>

  <!-- Page Title -->
  <div class="page-title">
    <h1><i class="fas fa-heart"></i> Personal Attitude</h1>
    <p>Behavioral & Spiritual Analysis</p>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-card">
      <select id="filterClass" class="filter-select">
        <option value="">All Classes</option>
      </select>
      <button id="resetFilters" class="reset-btn">
        <i class="fas fa-redo"></i> Reset
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div class="table-container">
      <table id="nilaiTable">
        <thead>
          <tr>
            <th>ID</th>
            <th style="min-width:100px;">Name</th>
            <th>Class</th>
            <th>Life (A)</th>
            <th>Spiritual (B)</th>
            <th>Social (C)</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="7" style="text-align:center; padding:2rem; color:var(--text-muted);">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="attitudeModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-header">
        <h3 id="modalTitle">Attitude Details</h3>
        <span class="modal-subtitle" id="modalSubtitle">Student Name</span>
      </div>
      <ul class="modal-list" id="modalList">
        <!-- JS populates this -->
      </ul>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="../../../eduportal-mobile.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="../../../jurnal-kelas.html" class="nav-item">
      <i class="fas fa-book-open"></i>
      <span>Jurnal</span>
    </a>
    <a href="../../../morphea-index.html" class="nav-item">
      <i class="fas fa-images"></i>
      <span>Morphea</span>
    </a>
    <a href="../../index.html" class="nav-item ess-nav active">
      <i class="fas fa-chart-bar"></i>
      <span>ESS</span>
    </a>
    <a href="../../../pts/index.html" class="nav-item">
      <i class="fas fa-clipboard-list"></i>
      <span>Assess</span>
    </a>
  </nav>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/6281234567890" target="_blank" class="wa-fab" title="Hubungi via WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1N-docAeezSqzkQcTk8mcPm-qMf-EisMELs_N35zAaT8/gviz/tq?tqx=out:csv&sheet=%F0%9F%98%8A%20personal_attitude";
    const filterClass = document.getElementById("filterClass");
    const resetBtn = document.getElementById("resetFilters");
    const tableBody = document.getElementById("tableBody");
    const attitudeModal = document.getElementById("attitudeModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalList = document.getElementById("modalList");
    const modalClose = document.getElementById("modalClose");
    let allData = [];

    function parseCSV(csvText) {
      const rows = [];
      let currentRow = [];
      let inQuotes = false;
      let currentValue = "";
      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if (char === '\n' && !inQuotes) {
          currentRow.push(currentValue.trim());
          rows.push(currentRow);
          currentRow = [];
          currentValue = "";
        } else {
          currentValue += char;
        }
      }
      if (currentValue.trim() !== "") {
        currentRow.push(currentValue.trim());
        rows.push(currentRow);
      }
      return rows;
    }

    const attitudeMaps = {
      kehidupan: {
        '1': 'Kebersihan/Kerapian',
        '2': 'Ketekunan/Ketelitian',
        '3': 'Tanggung Jawab Lingkungan',
        '4': 'Berpikir Kritis',
        '5': 'Toleransi',
        '6': 'Leadership',
        '7': 'Keberanian',
        '8': 'Nasionalisme',
        '9': 'Kreativitas/Inovasi'
      },
      spiritual: {
        '1': 'Bersyukur',
        '2': 'Sholat Berjama\'ah',
        '3': 'Berdoa Memulai Kegiatan',
        '4': 'Mengucapkan Salam',
        '5': 'Suka Membaca Al-Qur\'an'
      },
      sosial: {
        '1': 'Jujur',
        '2': 'Disiplin',
        '3': 'Empati/Kasih Sayang',
        '4': 'Tanggung Jawab',
        '5': 'Kerja Sama',
        '6': 'Rasa Hormat'
      }
    };

    function formatAttitude(numbers) {
      if (!numbers || numbers.trim() === '-' || numbers.trim() === '') return '-';
      const nums = numbers.split(',').map(n => n.trim()).filter(n => n);
      return nums.length > 0 ? nums.join(', ') : '-';
    }

    function showModal(numbers, type, studentName, className) {
      if (!numbers || numbers.trim() === '-' || numbers.trim() === '') {
        modalList.innerHTML = '<li>No data recorded.</li>';
      } else {
        const nums = numbers.split(',').map(n => n.trim()).filter(n => n);
        const labels = nums.map(n => attitudeMaps[type][n] || n).filter(Boolean);
        modalList.innerHTML = labels.length ? labels.map(l => `<li>${l}</li>`).join('') : '<li>No data.</li>';
      }
      modalTitle.textContent = `${type.charAt(0).toUpperCase() + type.slice(1)} Attitude`;
      modalSubtitle.textContent = `${studentName} (${className})`;
      attitudeModal.style.display = 'flex';
    }

    async function loadData() {
      try {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);

        allData = rows.slice(1).filter(r => r.length >= 8 && r[1]).map(row => ({
          studentCode: row[1].replace(/"/g, ""),
          studentName: row[2].replace(/"/g, ""),
          class: row[3].replace(/"/g, ""),
          sikapKehidupan: row[4].replace(/"/g, ""),
          sikapSpiritual: row[5].replace(/"/g, ""),
          sikapSosial: row[6].replace(/"/g, ""),
          keterangan: row[7] ? row[7].replace(/"/g, "") : "-"
        }));

        renderTable(allData);
        fillDropdowns(allData);
      } catch (e) {
        console.error("Error:", e);
        tableBody.innerHTML = `<tr><td colspan="7" style="color:red; text-align:center; padding:2rem;">Error loading data.</td></tr>`;
      }
    }

    function renderTable(data) {
      tableBody.innerHTML = "";
      if (data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:2rem;">No data found</td></tr>`;
        return;
      }
      data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="font-family:monospace; color:var(--text-muted); font-size:0.75rem;">${item.studentCode}</td>
          <td style="font-weight:500; text-align:left;">${item.studentName}</td>
          <td><span class="badge-class">${item.class}</span></td>
          <td><span class="attitude-cell" onclick="showModal('${item.sikapKehidupan}','kehidupan','${item.studentName}','${item.class}')">${formatAttitude(item.sikapKehidupan)}</span></td>
          <td><span class="attitude-cell" onclick="showModal('${item.sikapSpiritual}','spiritual','${item.studentName}','${item.class}')">${formatAttitude(item.sikapSpiritual)}</span></td>
          <td><span class="attitude-cell" onclick="showModal('${item.sikapSosial}','sosial','${item.studentName}','${item.class}')">${formatAttitude(item.sikapSosial)}</span></td>
          <td style="font-size:0.75rem;">${item.keterangan}</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function fillDropdowns(data) {
      const classSet = new Set(data.map(item => item.class).filter(Boolean));
      filterClass.innerHTML = '<option value="">All Classes</option>';
      Array.from(classSet).sort().forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        filterClass.appendChild(option);
      });
    }

    filterClass.addEventListener("change", () => {
      const val = filterClass.value.toLowerCase();
      const filtered = val ? allData.filter(i => i.class.toLowerCase() === val) : allData;
      renderTable(filtered);
    });

    resetBtn.addEventListener("click", () => {
      filterClass.value = "";
      renderTable(allData);
    });

    modalClose.addEventListener("click", () => {
      attitudeModal.style.display = 'none';
    });

    window.addEventListener("click", (e) => {
      if (e.target === attitudeModal) {
        attitudeModal.style.display = 'none';
      }
    });

    loadData();
  </script>
</body>
</html>
