<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Progress | ESS Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #234626;
      --primary-dark: #1a351d;
      --accent: #D4AF37;
      --bg-color: #F8FAFC;
      --text-main: #1E293B;
      --text-muted: #64748B;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      padding-bottom: 90px;
      min-height: 100vh;
    }

    /* Diagonal Stripes Background */
    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-color: #F8FAFC;
      background-image: 
        repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.02) 30px, rgba(35, 70, 38, 0.02) 31px),
        repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.015) 30px, rgba(35, 70, 38, 0.015) 31px);
    }

    /* Mobile Sticky Header */
    .mobile-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      color: white;
      text-decoration: none;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(-2px);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }

    .header-logo img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .header-title {
      font-family: 'Poppins', sans-serif;
      color: white;
      font-weight: 600;
      font-size: 1rem;
    }

    .header-subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 0.7rem;
    }

    /* Page Title */
    .page-title {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
    }

    .page-title h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .page-title h1 i {
      color: var(--accent);
    }

    .page-title p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0;
    }

    /* Stats Container */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      max-width: 600px;
      margin: 0 auto 1.5rem;
      padding: 0 1rem;
    }

    .stat-card {
      background: white;
      padding: 1rem 0.75rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      text-align: center;
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      margin: 0 auto 0.5rem;
    }

    .stat-info h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0;
    }

    .stat-info p {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 0.25rem 0 0;
    }

    /* Table */
    .table-wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .table-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid rgba(35, 70, 38, 0.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    thead {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    th {
      padding: 0.7rem 0.4rem;
      text-align: center;
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.3px;
      font-family: 'Poppins', sans-serif;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    th:last-child {
      border-right: none;
    }

    td {
      padding: 0.6rem 0.4rem;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
      color: var(--text-main);
      font-size: 0.8rem;
    }

    tr:hover td {
      background-color: rgba(35, 70, 38, 0.03);
    }

    .total-row {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    }

    .total-row td {
      color: white;
      font-weight: 600;
      border-top: 3px solid var(--accent);
      border-bottom: none;
    }

    /* Progress Badges */
    .status-badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.6rem;
      letter-spacing: 0.3px;
      display: inline-block;
      text-transform: uppercase;
    }

    .status-excellent {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .status-good {
      background: #fef9c3;
      color: #854d0e;
      border: 1px solid #fde047;
    }

    .status-needs-improvement {
      background: #ffedd5;
      color: #9a3412;
      border: 1px solid #fdba74;
    }

    .status-critical {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .status-waiting {
      background: #f3f4f6;
      color: #4b5563;
      border: 1px solid #d1d5db;
    }

    .avg-badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.75rem;
    }

    .avg-good {
      color: #166534;
      background: #dcfce7;
    }

    .avg-warning {
      color: #991b1b;
      background: #fee2e2;
    }

    .avg-neutral {
      color: #4b5563;
      background: #f3f4f6;
    }

    .remedial-num {
      color: #b91c1c;
      font-weight: 600;
    }

    .passed-num {
      color: #15803d;
      font-weight: 600;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0.25rem;
      box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
      z-index: 1000;
      border-top: 1px solid rgba(35, 70, 38, 0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.35rem 0.5rem;
      transition: all 0.2s;
      border-radius: 8px;
      min-width: 50px;
    }

    .nav-item i {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item.active i {
      color: var(--primary);
    }

    .nav-item.ess-nav {
      background: linear-gradient(135deg, var(--accent) 0%, #C4A030 100%);
      color: var(--primary-dark);
      padding: 0.5rem 0.75rem;
      border-radius: 12px;
      margin-top: -0.5rem;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }

    .nav-item.ess-nav i {
      color: var(--primary-dark);
    }

    .nav-item:hover:not(.ess-nav) {
      background: rgba(35, 70, 38, 0.05);
      color: var(--primary);
    }

    /* WhatsApp FAB */
    .wa-fab {
      position: fixed;
      bottom: 90px;
      right: 1rem;
      width: 48px;
      height: 48px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
      z-index: 999;
      transition: all 0.2s;
    }

    .wa-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    @media (max-width: 400px) {
      .stats-container {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      
      .stat-card {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-align: left;
        padding: 0.75rem;
      }
      
      .stat-icon {
        margin: 0;
      }
      
      .stat-info h3 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <a href="../../index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-logo">
      <img src="https://ui-avatars.com/api/?name=ESS&background=1a351d&color=D4AF37&size=32&bold=true" alt="ESS Logo">
      <div>
        <div class="header-title">ESS Dashboard</div>
        <div class="header-subtitle">MTsT Daarut Tahfizh Al-Ikhlas</div>
      </div>
    </div>
  </header>

  <!-- Page Title -->
  <div class="page-title">
    <h1><i class="fas fa-chart-line"></i> Class Progress</h1>
    <p>Overall Academic Trajectory Analysis</p>
  </div>

  <!-- Stats -->
  <div class="stats-container">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-school"></i></div>
      <div class="stat-info">
        <h3 id="totalClasses">-</h3>
        <p>Classes</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-user-graduate"></i></div>
      <div class="stat-info">
        <h3 id="totalStudents">-</h3>
        <p>Students</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-sync"></i></div>
      <div class="stat-info">
        <h3 id="lastUpdate" style="font-size:0.85rem;">-</h3>
        <p>Last Sync</p>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div class="table-container">
      <table id="progressTable">
        <thead>
          <tr>
            <th>Class</th>
            <th>Students</th>
            <th>Avg PTS</th>
            <th>Avg UAS</th>
            <th>Avg Daily</th>
            <th>PTS Remed</th>
            <th>PTS Pass</th>
            <th>UAS Remed</th>
            <th>UAS Pass</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="10" style="text-align:center; padding:2rem; color:var(--text-muted);">Loading progress data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="../../../eduportal-mobile.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="../../../jurnal-kelas.html" class="nav-item">
      <i class="fas fa-book-open"></i>
      <span>Jurnal</span>
    </a>
    <a href="../../../morphea-index.html" class="nav-item">
      <i class="fas fa-images"></i>
      <span>Morphea</span>
    </a>
    <a href="../../index.html" class="nav-item ess-nav active">
      <i class="fas fa-chart-bar"></i>
      <span>ESS</span>
    </a>
    <a href="../../../pts/index.html" class="nav-item">
      <i class="fas fa-clipboard-list"></i>
      <span>Assess</span>
    </a>
  </nav>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/6281234567890" target="_blank" class="wa-fab" title="Hubungi via WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1N-docAeezSqzkQcTk8mcPm-qMf-EisMELs_N35zAaT8/gviz/tq?tqx=out:csv&sheet=%F0%9F%93%88%20class_progress";
    const tableBody = document.getElementById("tableBody");
    const totalClasses = document.getElementById("totalClasses");
    const totalStudents = document.getElementById("totalStudents");
    const lastUpdate = document.getElementById("lastUpdate");
    let allData = [];

    function parseCSV(csvText) {
      const rows = [];
      let currentRow = [];
      let inQuotes = false;
      let currentValue = "";
      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if (char === '\n' && !inQuotes) {
          currentRow.push(currentValue.trim());
          rows.push(currentRow);
          currentRow = [];
          currentValue = "";
        } else {
          currentValue += char;
        }
      }
      if (currentValue.trim() !== "") {
        currentRow.push(currentValue.trim());
        rows.push(currentRow);
      }
      return rows;
    }

    function getStatusClass(status) {
      if (!status) return '';
      if (status.includes('EXCELLENT')) return 'status-excellent';
      if (status.includes('GOOD')) return 'status-good';
      if (status.includes('IMPROVEMENT')) return 'status-needs-improvement';
      if (status.includes('CRITICAL')) return 'status-critical';
      return 'status-waiting';
    }

    function formatAverage(value) {
      if (value === 'NO DATA' || value === 'WAITING DATA' || !value) {
        return `<span class="avg-badge avg-neutral">-</span>`;
      }
      const num = parseFloat(value);
      if (isNaN(num)) return `<span class="avg-badge avg-neutral">${value}</span>`;
      let className = num < 75 ? 'avg-warning' : 'avg-good';
      return `<span class="avg-badge ${className}">${num.toFixed(2)}</span>`;
    }

    async function loadData() {
      try {
        const response = await fetch(SHEET_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);

        allData = rows.slice(1).filter(r => r.length >= 11 && r[1]).map(row => ({
          no: row[0].replace(/"/g, ""),
          class: row[1].replace(/"/g, ""),
          totalStudents: row[2].replace(/"/g, ""),
          avgPTS: row[3].replace(/"/g, ""),
          avgUAS: row[4].replace(/"/g, ""),
          avgDaily: row[5].replace(/"/g, ""),
          ptsNeedRemedial: row[6].replace(/"/g, ""),
          ptsPassed: row[7].replace(/"/g, ""),
          uasNeedRemedial: row[8].replace(/"/g, ""),
          uasPassed: row[9].replace(/"/g, ""),
          progressStatus: row[10].replace(/"/g, "")
        }));

        renderTable(allData);
        updateStatistics(allData);
        updateLastUpdate();
      } catch (e) {
        console.error("Error:", e);
        tableBody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:red; padding:2rem;">Failed to load data.</td></tr>`;
      }
    }

    function renderTable(data) {
      tableBody.innerHTML = "";
      const regularRows = data.filter(item => !item.class.includes('Kelas') && !item.class.includes('TOTAL'));
      const footerRow = data.find(item => item.class.includes('Kelas') || item.class.includes('TOTAL'));

      regularRows.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="font-weight:700; color:var(--primary);">${item.class}</td>
          <td>${item.totalStudents}</td>
          <td>${formatAverage(item.avgPTS)}</td>
          <td>${formatAverage(item.avgUAS)}</td>
          <td>${formatAverage(item.avgDaily)}</td>
          <td class="remedial-num">${item.ptsNeedRemedial}</td>
          <td class="passed-num">${item.ptsPassed}</td>
          <td class="remedial-num">${item.uasNeedRemedial}</td>
          <td class="passed-num">${item.uasPassed}</td>
          <td><span class="status-badge ${getStatusClass(item.progressStatus)}">${item.progressStatus}</span></td>
        `;
        tableBody.appendChild(tr);
      });

      if (footerRow) {
        const tr = document.createElement("tr");
        tr.classList.add('total-row');
        tr.innerHTML = `
          <td>TOTAL/AVG</td>
          <td>${footerRow.totalStudents}</td>
          <td>${formatAverage(footerRow.avgPTS)}</td>
          <td>${formatAverage(footerRow.avgUAS)}</td>
          <td>${formatAverage(footerRow.avgDaily)}</td>
          <td>${footerRow.ptsNeedRemedial}</td>
          <td>${footerRow.ptsPassed}</td>
          <td>${footerRow.uasNeedRemedial}</td>
          <td>${footerRow.uasPassed}</td>
          <td><span class="status-badge ${getStatusClass(footerRow.progressStatus)}" style="background:white; color:var(--primary);">${footerRow.progressStatus}</span></td>
        `;
        tableBody.appendChild(tr);
      }
    }

    function updateStatistics(data) {
      const classes = data.filter(item => !item.class.includes('Kelas'));
      totalClasses.textContent = classes.length;
      const footerRow = data.find(item => item.class.includes('Kelas'));
      totalStudents.textContent = footerRow ? footerRow.totalStudents : "-";
    }

    function updateLastUpdate() {
      const now = new Date();
      lastUpdate.textContent = now.toLocaleString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    loadData();
  </script>
</body>
</html>
