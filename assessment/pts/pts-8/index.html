<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1.0, user-scalable=no">
<title>Nilai PTS Kelas 8 | EduPortal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        /* Tema Khas EduPortal */
        --primary: #234626;
        --primary-dark: #1a351d;
        --primary-light: #2f5e33;
        --accent: #D4AF37;
        --accent-hover: #b5952f;
        --bg-color: #F8FAFC;
        --text-main: #1E293B;
        --text-muted: #64748B;
        --white: #FFFFFF;
        --card-bg: rgba(255, 255, 255, 0.95);
        --card-border: rgba(35, 70, 38, 0.08);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 8px 24px rgba(35, 70, 38, 0.12);
        --success: #16A34A;
        --warning: #D97706;
        --danger: #B91C1C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        padding-bottom: 90px;
    }

    /* Background Pattern */
    .bg-pattern {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        background-color: var(--bg-color);
        background-image: 
            repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.02) 30px, rgba(35, 70, 38, 0.02) 31px),
            repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.015) 30px, rgba(35, 70, 38, 0.015) 31px),
            radial-gradient(at 0% 0%, rgba(35, 70, 38, 0.04) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.04) 0px, transparent 50%);
    }

    /* Mobile Header */
    .mobile-header {
        background: var(--primary);
        color: white;
        padding: 1rem 1.25rem;
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .mobile-header-left { display: flex; align-items: center; gap: 0.75rem; }

    .mobile-header-logo {
        width: 42px; height: 42px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.25rem; color: var(--accent);
    }

    .mobile-header-title { font-family: 'Poppins', sans-serif; font-size: 1.15rem; font-weight: 600; }
    .mobile-header-subtitle { font-size: 0.7rem; opacity: 0.8; font-weight: 400; }

    .back-btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        text-decoration: none; color: white; font-weight: 500; font-size: 0.85rem;
        padding: 0.5rem 0.85rem; background: rgba(255, 255, 255, 0.15);
        border-radius: 50px; transition: all 0.25s ease; border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .back-btn:hover { background: var(--accent); color: var(--primary); transform: translateX(-3px); }

    /* Main Container */
    .main-container { padding: 1.5rem 1.25rem; max-width: 1200px; margin: 0 auto; }

    /* Hero Card */
    .hero-card {
        background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
        border-radius: 20px; padding: 1.5rem; color: white;
        margin-bottom: 1.5rem; position: relative; overflow: hidden;
        box-shadow: 0 8px 32px rgba(35, 70, 38, 0.25);
    }
    .hero-card::before {
        content: ''; position: absolute; top: -30%; right: -20%;
        width: 180px; height: 180px;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%);
    }
    .hero-badge {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: rgba(212, 175, 55, 0.15); color: var(--accent);
        padding: 0.3rem 0.75rem; border-radius: 50px; font-size: 0.7rem;
        font-weight: 600; margin-bottom: 0.75rem; border: 1px solid rgba(212, 175, 55, 0.25);
    }
    .hero-title { font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.4rem; position: relative; z-index: 1; }
    .hero-subtitle { font-size: 0.85rem; opacity: 0.85; line-height: 1.6; position: relative; z-index: 1; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.85rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card-bg); padding: 1.25rem; border-radius: 14px; border: 1px solid var(--card-border); text-align: center; box-shadow: var(--shadow-sm); }
    .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: block; margin-bottom: 0.15rem; }
    .stat-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Controls */
    .controls {
        background: var(--card-bg); border-radius: 14px; border: 1px solid var(--card-border);
        padding: 1rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.75rem;
    }
    input, select {
        padding: 0.65rem 1rem; border: 1px solid var(--card-border); border-radius: 10px;
        font-size: 0.85rem; font-family: 'Inter', sans-serif; background: var(--bg-color);
        color: var(--text-main); transition: all 0.25s ease;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15); background: white; }
    .chk { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; cursor: pointer; color: var(--text-main); }

    /* Table */
    .table-container { background: white; border-radius: 16px; overflow-x: auto; box-shadow: var(--shadow-sm); border: 1px solid var(--card-border); }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    thead { background: var(--primary); color: white; position: sticky; top: 0; }
    th { padding: 0.85rem 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    td { padding: 0.85rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 0.85rem; }
    tr:hover td { background-color: rgba(35, 70, 38, 0.03); }

    .chip { padding: 4px 10px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .ok { background: #dcfce7; color: var(--success); }
    .warn { background: #fef9c3; color: var(--warning); }
    .bad { background: #fee2e2; color: var(--danger); }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); padding: 0.5rem 0.35rem calc(0.5rem + env(safe-area-inset-bottom)); box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06); z-index: 1000; border-top: 1px solid var(--card-border); }
    .bottom-nav-inner { display: flex; justify-content: space-around; align-items: center; max-width: 500px; margin: 0 auto; }
    .nav-item { display: flex; flex-direction: column; align-items: center; padding: 0.4rem 0.5rem; border-radius: 12px; cursor: pointer; transition: all 0.25s ease; text-decoration: none; color: var(--text-muted); min-width: 48px; position: relative; }
    .nav-item i { font-size: 1.1rem; margin-bottom: 0.15rem; }
    .nav-item span { font-size: 0.55rem; font-weight: 500; }
    .nav-item.active { color: var(--primary); background: rgba(35, 70, 38, 0.08); }
    .nav-item.active::before { content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); width: 16px; height: 3px; background: var(--accent); border-radius: 0 0 3px 3px; }
    .nav-item.highlight { color: #9a7b1e; }
    .nav-item.highlight i { color: var(--accent); }

    /* FAB */
    .fab { position: fixed; bottom: 80px; right: 1rem; width: 50px; height: 50px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.35rem; box-shadow: 0 4px 16px rgba(37, 211, 102, 0.35); z-index: 100; transition: transform 0.25s ease; text-decoration: none; }
    .fab:hover { transform: scale(1.08); }

    /* Desktop */
    @media (min-width: 769px) {
        .mobile-header { display: none; }
        .bottom-nav { display: none; }
        .fab { bottom: 1.5rem; right: 1.5rem; }
        body { padding-bottom: 0; }
        .main-container { padding: 2rem; }
        .hero-card { padding: 2rem; }
        .hero-title { font-size: 2rem; }
        .stats { grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .controls { flex-direction: row; align-items: center; }
        input, select { flex: 1; min-width: 180px; }
    }
</style>
</head>
<body>
<div class="bg-pattern"></div>

<!-- Mobile Header -->
<header class="mobile-header">
    <div class="mobile-header-left">
        <div class="mobile-header-logo"><i class="fa-solid fa-graduation-cap"></i></div>
        <div>
            <div class="mobile-header-title">Kelas VIII</div>
            <div class="mobile-header-subtitle">EduPortal • PTS Scores</div>
        </div>
    </div>
    <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
</header>

<div class="main-container">
    <!-- Hero Card -->
    <div class="hero-card">
        <span class="hero-badge"><i class="fa-solid fa-sparkles"></i> PTS Assessment</span>
        <h1 class="hero-title">Nilai PTS Kelas VIII</h1>
        <p class="hero-subtitle">Semester Ganjil 2025/2026 • MTsT Daarut Tahfizh Al-Ikhlas</p>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card"><span class="stat-val" id="kpiTotal">-</span><span class="stat-lbl">Total Siswa</span></div>
        <div class="stat-card"><span class="stat-val" id="kpiRem" style="color:var(--danger)">-</span><span class="stat-lbl">Remedial</span></div>
        <div class="stat-card"><span class="stat-val" id="kpiHigh" style="color:var(--success)">-</span><span class="stat-lbl">Tertinggi</span></div>
        <div class="stat-card"><span class="stat-val" id="kpiLow">-</span><span class="stat-lbl">Terendah</span></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <input id="q" type="search" placeholder="Cari Nama Siswa...">
        <select id="sortSelect">
            <option value="name_asc">Nama A-Z</option>
            <option value="score_desc">Nilai Tertinggi</option>
            <option value="score_asc">Nilai Terendah</option>
        </select>
        <label class="chk"><input type="checkbox" id="remOnly"> Tampilkan Remedial Saja</label>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table id="tbl">
            <thead><tr id="thead"></tr></thead>
            <tbody id="tbody"><tr><td colspan="9" style="text-align:center; padding:2rem;">Memuat data...</td></tr></tbody>
        </table>
    </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <div class="bottom-nav-inner">
        <a href="https://azhibnmjkfr.github.io/eduportal/" class="nav-item"><i class="fa-solid fa-home"></i><span>Home</span></a>
        <a href="https://azhibnmjkfr.github.io/Kegiatan-Kelas-MTsTDTI-2025-2026/" target="_blank" class="nav-item"><i class="fa-solid fa-book-open"></i><span>Jurnal</span></a>
        <a href="https://azhibnmjkfr.github.io/MorpheaDTI/" target="_blank" class="nav-item"><i class="fa-solid fa-images"></i><span>Morphea</span></a>
        <a href="https://azhibnmjkfr.github.io/english-scores-system/" target="_blank" class="nav-item highlight"><i class="fa-solid fa-graduation-cap"></i><span>ESS</span></a>
        <a href="../index.html" class="nav-item active"><i class="fa-solid fa-file-alt"></i><span>Assess</span></a>
    </div>
</nav>

<a href="https://wa.me/6282246077307?text=Hello%20Mr.%20Ahmad,%20I%20need%20assistance%20with%20PTS%20Kelas%208." target="_blank" class="fab"><i class="fa-brands fa-whatsapp"></i></a>

<script>
(async()=>{
    const CSV_URL="https://docs.google.com/spreadsheets/d/1yT7_KQLVylZEPqHKucrt1Zz7d2gHEiOx4pgmGKPALa0/gviz/tq?tqx=out:csv&sheet=VIII_Scores";
    const wantCols=["No","Name","Class","Attendance","Part A","Part B","Part C","Nilai Akhir","Status"];
    
    try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const rows = text.trim().split(/\r?\n/).map(l => l.match(/("([^"]|"")*"|[^,])+/g)?.map(s => s.replace(/^"|"$/g, '').trim()) ?? []);
        
        const raw = rows.slice(1); 
        const thead = document.getElementById("thead");
        wantCols.forEach(c => { const th=document.createElement("th"); th.textContent=c; thead.appendChild(th); });
        
        const tbody = document.getElementById("tbody");
        const kpiTotal=document.getElementById("kpiTotal"), kpiRem=document.getElementById("kpiRem"), kpiHigh=document.getElementById("kpiHigh"), kpiLow=document.getElementById("kpiLow");

        const badge = (v, type) => {
            const span = document.createElement("span");
            let cls = "ok";
            if(type==="status") cls = /remed/i.test(v) ? "warn" : (/tidak|absen/i.test(v) ? "bad" : "ok");
            else cls = /tidak|absen/i.test(v) ? "bad" : (/hadir/i.test(v) ? "ok" : "warn");
            span.className = `chip ${cls}`; span.textContent = v || "-";
            return span;
        };

        const scores = raw.map(r => parseFloat(r[7])).filter(n => !isNaN(n));
        kpiTotal.textContent = raw.length;
        kpiRem.textContent = raw.reduce((a,r) => a + (/remed/i.test(r[8]) ? 1 : 0), 0);
        kpiHigh.textContent = scores.length ? Math.max(...scores) : "-";
        kpiLow.textContent = scores.length ? Math.min(...scores) : "-";

        const state = { q: "", remOnly: false, sort: "name_asc" };

        const render = () => {
            const q = state.q.toLowerCase();
            let filtered = raw.filter(r => {
                if (q && !r.join(" ").toLowerCase().includes(q)) return false;
                if (state.remOnly && !/remed/i.test(r[8])) return false;
                return true;
            });

            if (state.sort === "score_desc") filtered.sort((a,b) => (parseFloat(b[7])||0) - (parseFloat(a[7])||0));
            else if (state.sort === "score_asc") filtered.sort((a,b) => (parseFloat(a[7])||0) - (parseFloat(b[7])||0));
            else if (state.sort === "name_asc") filtered.sort((a,b) => a[1].localeCompare(b[1]));

            tbody.innerHTML = "";
            if(!filtered.length) { tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:2rem;">Data tidak ditemukan.</td></tr>`; return; }

            filtered.forEach(r => {
                const tr = document.createElement("tr");
                r.forEach((v, i) => {
                    if(i > 8) return; 
                    const td = document.createElement("td");
                    if (i === 3) td.appendChild(badge(v, "att"));
                    else if (i === 8) td.appendChild(badge(v, "status"));
                    else if (i === 7) { td.style.fontWeight="700"; td.style.color="var(--primary)"; td.textContent=v; }
                    else td.textContent = v || "-";
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        };

        document.getElementById("q").oninput = e => { state.q = e.target.value; render(); };
        document.getElementById("sortSelect").onchange = e => { state.sort = e.target.value; render(); };
        document.getElementById("remOnly").onchange = e => { state.remOnly = e.target.checked; render(); };
        
        render();

    } catch(e) {
        document.getElementById("tbody").innerHTML = `<tr><td colspan="9" style="color:red; text-align:center; padding:2rem;">Gagal memuat data.</td></tr>`;
    }
})();
</script>
</body>
</html>
