<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assessment | EduPortal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #234626;
            --primary-light: #2f5e33;
            --accent: #D4AF37;
            --accent-light: #e6c656;
            --bg-color: #F8FAFC;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(35, 70, 38, 0.08);
            --nav-bg: #FFFFFF;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 24px rgba(35, 70, 38, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 85px;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: var(--bg-color);
            background-image: 
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 30px,
                    rgba(35, 70, 38, 0.02) 30px,
                    rgba(35, 70, 38, 0.02) 31px
                ),
                radial-gradient(at 0% 0%, rgba(35, 70, 38, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.04) 0px, transparent 50%);
        }

        .mobile-header {
            background: var(--primary);
            color: white;
            padding: 1rem 1.25rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mobile-header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .mobile-header-logo {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--accent);
        }

        .mobile-header-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .mobile-header-subtitle {
            font-size: 0.7rem;
            opacity: 0.8;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .container {
            padding: 1.5rem 1.25rem;
        }

        .page-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .assessment-grid {
            display: grid;
            gap: 1rem;
        }

        .assessment-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.25s ease;
        }

        .assessment-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .assessment-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .assessment-card.pts .assessment-icon {
            background: linear-gradient(135deg, var(--primary) 0%, #1a351d 100%);
            color: white;
        }

        .assessment-card.pas .assessment-icon {
            background: linear-gradient(135deg, var(--accent) 0%, #b5952f 100%);
            color: white;
        }

        .assessment-content {
            flex: 1;
        }

        .assessment-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .assessment-card.pas .assessment-title {
            color: #9a7b1e;
        }

        .assessment-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .assessment-arrow {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .footer {
            text-align: center;
            padding: 1.25rem 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid rgba(0,0,0,0.04);
            background: var(--card-bg);
            margin-top: auto;
        }

        .footer strong {
            color: var(--primary);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            padding: 0.5rem 0.35rem calc(0.5rem + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
            z-index: 1000;
            border-top: 1px solid var(--card-border);
        }

        .bottom-nav-inner {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.4rem 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            color: var(--text-muted);
            min-width: 48px;
            position: relative;
        }

        .nav-item i {
            font-size: 1.1rem;
            margin-bottom: 0.15rem;
            transition: all 0.25s ease;
        }

        .nav-item span {
            font-size: 0.55rem;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(35, 70, 38, 0.08);
        }

        .nav-item.active i {
            transform: scale(1.1);
        }

        .nav-item:hover {
            color: var(--primary);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background: var(--accent);
            border-radius: 0 0 3px 3px;
        }

        .nav-item.highlight {
            color: #9a7b1e;
        }

        .nav-item.highlight i {
            color: var(--accent);
        }

        .nav-item.highlight:hover {
            color: #9a7b1e;
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <!-- Mobile Header -->
    <header class="mobile-header">
        <div class="mobile-header-left">
            <div class="mobile-header-logo">
                <i class="fa-solid fa-file-alt"></i>
            </div>
            <div>
                <div class="mobile-header-title">Assessment</div>
                <div class="mobile-header-subtitle">EduPortal</div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        
        <h1 class="page-title">Assessment</h1>
        <p class="page-subtitle">Pilih jenis penilaian untuk melanjutkan</p>

        <div class="assessment-grid">
            <a href="/epmobile/assesment/pts/index.html" class="assessment-card pts">
                <div class="assessment-icon">
                    <i class="fa-solid fa-clipboard-list"></i>
                </div>
                <div class="assessment-content">
                    <div class="assessment-title">PTS</div>
                    <div class="assessment-desc">Penilaian Tengah Semester</div>
                </div>
                <div class="assessment-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </a>

            <a href="/epmobile/assesment/pas/index.html" class="assessment-card pas">
                <div class="assessment-icon">
                    <i class="fa-solid fa-award"></i>
                </div>
                <div class="assessment-content">
                    <div class="assessment-title">PAS</div>
                    <div class="assessment-desc">Penilaian Akhir Semester</div>
                </div>
                <div class="assessment-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </a>
        </div>

        <footer class="footer">
            <p>&copy; 2025 <strong>Paperless School Initiative</strong></p>
        </footer>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="/epmobile/" class="nav-item">
                <i class="fa-solid fa-home"></i>
                <span>Home</span>
            </a>
            <a href="/epmobile/jurnal/index.html" class="nav-item">
                <i class="fa-solid fa-book-open"></i>
                <span>Jurnal</span>
            </a>
            <a href="/epmobile/morphea/index.html" class="nav-item">
                <i class="fa-solid fa-images"></i>
                <span>Morphea</span>
            </a>
            <a href="/epmobile/ess/index.html" class="nav-item highlight">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>ESS</span>
            </a>
            <a href="/epmobile/assesment/index.html" class="nav-item active">
                <i class="fa-solid fa-file-alt"></i>
                <span>Assess</span>
            </a>
        </div>
    </nav>

</body>
</html>
