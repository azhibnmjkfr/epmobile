<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jurnal Kelas | EduPortal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #234626;
            --primary-dark: #1a351d;
            --primary-light: #2f5e33;
            --accent: #D4AF37;
            --accent-hover: #b5952f;
            --bg-color: #F8FAFC;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --white: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(35, 70, 38, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 24px rgba(35, 70, 38, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-color: var(--bg-color);
            background-image: 
                repeating-linear-gradient(-45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.02) 30px, rgba(35, 70, 38, 0.02) 31px),
                repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(35, 70, 38, 0.015) 30px, rgba(35, 70, 38, 0.015) 31px),
                radial-gradient(at 0% 0%, rgba(35, 70, 38, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.04) 0px, transparent 50%);
        }

        /* Mobile Header */
        .mobile-header {
            background: var(--primary); color: white; padding: 1rem 1.25rem;
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
        }

        .mobile-header-left { display: flex; align-items: center; gap: 0.75rem; }

        .mobile-header-logo {
            width: 42px; height: 42px; background: rgba(255, 255, 255, 0.15);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; color: var(--accent);
        }

        .mobile-header-title { font-family: 'Poppins', sans-serif; font-size: 1.15rem; font-weight: 600; }
        .mobile-header-subtitle { font-size: 0.7rem; opacity: 0.8; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            text-decoration: none; color: white; font-weight: 500; font-size: 0.85rem;
            padding: 0.5rem 0.85rem; background: rgba(255, 255, 255, 0.15);
            border-radius: 50px; transition: all 0.25s ease;
        }

        .back-btn:hover { background: var(--accent); color: var(--primary); transform: translateX(-3px); }

        /* Container */
        .container {
            max-width: 1400px; margin: 1rem; background: var(--card-bg);
            border-radius: 20px; box-shadow: var(--shadow-md);
            border: 1px solid var(--card-border); overflow: hidden;
        }

        /* Page Header */
        .page-header {
            background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; padding: 1.5rem; position: relative; overflow: hidden;
        }

        .page-header::before {
            content: ''; position: absolute; top: -30%; right: -20%;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
        }

        .page-header::after {
            content: '\f02d'; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; bottom: -10px; right: 15px; font-size: 5rem;
            color: rgba(255, 255, 255, 0.05);
        }

        .page-header-content { position: relative; z-index: 1; }

        .page-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(212, 175, 55, 0.15); color: var(--accent);
            padding: 0.3rem 0.75rem; border-radius: 50px; font-size: 0.7rem;
            font-weight: 600; margin-bottom: 0.75rem;
        }

        .page-title { font-family: 'Poppins', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }

        .page-meta { display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.8rem; opacity: 0.9; }
        .page-meta span { display: inline-flex; align-items: center; gap: 0.4rem; }
        .page-meta i { color: var(--accent); }

        /* Filters */
        .filters-wrapper {
            padding: 1rem; background: var(--white);
            border-bottom: 1px solid var(--card-border);
            display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
        }

        .form-control {
            padding: 0.6rem 1rem; border: 1px solid var(--card-border);
            border-radius: 10px; background: var(--bg-color); color: var(--text-main);
            font-size: 0.85rem; min-width: 140px; cursor: pointer;
            transition: all 0.25s ease; font-family: 'Inter', sans-serif;
        }

        .form-control:focus { outline: none; border-color: var(--accent); background: white; }

        button#resetFilters {
            background: var(--primary); color: white; border: none;
            padding: 0.6rem 1.2rem; border-radius: 10px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease; font-size: 0.85rem;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }

        button#resetFilters:hover { background: var(--accent); color: var(--primary); }

        /* Table */
        .table-container { padding: 0; overflow-x: auto; max-height: 65vh; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

        thead { background: var(--primary); color: white; position: sticky; top: 0; z-index: 10; }

        th { padding: 0.85rem 1rem; text-align: left; font-weight: 600; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.9); }

        td { padding: 0.85rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.04);
            color: var(--text-main); vertical-align: middle; }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: rgba(35, 70, 38, 0.03); }

        .badge-kelas {
            display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px;
            font-weight: 600; font-size: 0.75rem;
            background: rgba(35, 70, 38, 0.08); color: var(--primary);
        }

        tr.kelas-7A .badge-kelas { background: #ecfdf5; color: #047857; }
        tr.kelas-7B .badge-kelas { background: #f0f9ff; color: #0369a1; }
        tr.kelas-8A .badge-kelas { background: #fffbeb; color: #b45309; }
        tr.kelas-8B .badge-kelas { background: #fdf2f8; color: #db2777; }
        tr.kelas-9A .badge-kelas { background: #f5f3ff; color: #7c3aed; }
        tr.kelas-9B .badge-kelas { background: #fff1f2; color: #e11d48; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 600;
        }

        .status-selesai { background-color: #dcfce7; color: #166534; }
        .status-proses { background-color: #fef3c7; color: #b45309; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--white);
            padding: 0.5rem 0.35rem calc(0.5rem + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06); z-index: 1000;
            border-top: 1px solid var(--card-border);
        }

        .bottom-nav-inner {
            display: flex; justify-content: space-around; align-items: center;
            max-width: 500px; margin: 0 auto;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            padding: 0.4rem 0.5rem; border-radius: 12px;
            cursor: pointer; transition: all 0.25s ease;
            text-decoration: none; color: var(--text-muted); min-width: 48px; position: relative;
        }

        .nav-item i { font-size: 1.1rem; margin-bottom: 0.15rem; }
        .nav-item span { font-size: 0.55rem; font-weight: 500; }

        .nav-item.active { color: var(--primary); background: rgba(35, 70, 38, 0.08); }
        .nav-item.active i { transform: scale(1.1); }
        .nav-item:hover { color: var(--primary); }

        .nav-item.active::before {
            content: ''; position: absolute; top: -1px; left: 50%;
            transform: translateX(-50%); width: 16px; height: 3px;
            background: var(--accent); border-radius: 0 0 3px 3px;
        }

        .nav-item.ess-nav { color: #9a7b1e; }
        .nav-item.ess-nav i { color: var(--accent); }
        .nav-item.ess-nav:hover { color: #9a7b1e; }

        /* WhatsApp FAB */
        .fab {
            position: fixed; bottom: 80px; right: 1rem;
            width: 50px; height: 50px; background: #25D366; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.35rem; box-shadow: 0 4px 16px rgba(37, 211, 102, 0.35);
            cursor: pointer; z-index: 100; transition: transform 0.25s ease; text-decoration: none;
        }

        .fab:hover { transform: scale(1.08); }

        /* Responsive */
        @media (min-width: 769px) {
            .mobile-header { display: none; }
            .bottom-nav { display: none; }
            .fab { bottom: 1.5rem; }
            body { padding: 1.5rem; padding-bottom: 1.5rem; }
            .container { margin: 0 auto; }

            .desktop-nav { display: flex; max-width: 1400px; margin: 0 auto 1rem auto; }

            .desktop-back-btn {
                display: inline-flex; align-items: center; gap: 0.5rem;
                text-decoration: none; color: var(--primary); font-weight: 600;
                padding: 0.6rem 1.25rem; background: var(--white); border-radius: 50px;
                box-shadow: var(--shadow-sm); transition: all 0.25s ease;
            }

            .desktop-back-btn:hover { transform: translateX(-3px); border-color: var(--accent); }
        }

        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .filters-wrapper { flex-direction: column; align-items: stretch; }
            .form-control { width: 100%; min-width: auto; }
            button#resetFilters { width: 100%; justify-content: center; }
            th, td { padding: 0.7rem 0.85rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <!-- Mobile Header -->
    <header class="mobile-header">
        <div class="mobile-header-left">
            <div class="mobile-header-logo"><i class="fa-solid fa-book-open"></i></div>
            <div>
                <div class="mobile-header-title">Jurnal Kelas</div>
                <div class="mobile-header-subtitle">EduPortal • English Department</div>
            </div>
        </div>
        <a href="https://azhibnmjkfr.github.io/epmobile/" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>
    </header>

    <!-- Desktop Navigation -->
    <div class="desktop-nav">
        <a href="https://azhibnmjkfr.github.io/epmobile/" class="desktop-back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-header-content">
                <span class="page-badge"><i class="fa-solid fa-sparkles"></i> Digital Teaching Log</span>
                <h1 class="page-title">Jurnal Kelas Digital</h1>
                <div class="page-meta">
                    <span><i class="fa-solid fa-user"></i> Ahmad Zaman Huri, S.Pd.</span>
                    <span><i class="fa-solid fa-school"></i> MTsT Daarut Tahfizh Al-Ikhlas</span>
                    <span><i class="fa-solid fa-book"></i> Bahasa Inggris</span>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-wrapper">
            <select id="filterKelas" class="form-control"><option value="">All Classes</option></select>
            <select id="filterBulan" class="form-control">
                <option value="">All Months</option>
                <option value="01">Januari</option>
                <option value="02">Februari</option>
                <option value="03">Maret</option>
                <option value="04">April</option>
                <option value="05">Mei</option>
                <option value="06">Juni</option>
                <option value="07">Juli</option>
                <option value="08">Agustus</option>
                <option value="09">September</option>
                <option value="10">Oktober</option>
                <option value="11">November</option>
                <option value="12">Desember</option>
            </select>
            <input type="date" id="filterTanggal" class="form-control">
            <select id="filterStatus" class="form-control">
                <option value="">All Status</option>
                <option value="selesai">Completed</option>
                <option value="proses">In Progress</option>
            </select>
            <button id="resetFilters"><i class="fa-solid fa-sync-alt"></i> Reset</button>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table id="kegiatanTable">
                <thead>
                    <tr>
                        <th>Kelas</th><th>Jam</th><th>Tanggal</th><th>Hari</th>
                        <th>Topik / Materi</th><th>Aktivitas</th><th>Target</th>
                        <th>Status</th><th>Keterangan</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="9" style="text-align:center; padding: 2rem;">Loading Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="https://azhibnmjkfr.github.io/epmobile/" class="nav-item">
                <i class="fa-solid fa-home"></i><span>Home</span>
            </a>
            <a href="https://azhibnmjkfr.github.io/epmobile/jurnal/" class="nav-item active">
                <i class="fa-solid fa-book-open"></i><span>Jurnal</span>
            </a>
            <a href="https://azhibnmjkfr.github.io/epmobile/morphea/" class="nav-item">
                <i class="fa-solid fa-images"></i><span>Morphea</span>
            </a>
            <a href="https://azhibnmjkfr.github.io/epmobile/ess/" class="nav-item ess-nav">
                <i class="fa-solid fa-graduation-cap"></i><span>ESS</span>
            </a>
            <a href="https://azhibnmjkfr.github.io/epmobile/assesment/pts/" class="nav-item">
                <i class="fa-solid fa-file-alt"></i><span>Assess</span>
            </a>
        </div>
    </nav>

    <!-- WhatsApp FAB -->
    <a href="https://wa.me/6282246077307" target="_blank" class="fab"><i class="fa-brands fa-whatsapp"></i></a>

    <script>
        const SHEET_ID = "1JTwCrf7N27tuN6R3qBMzasoVPg3KixnetD9jLafrAJs";
        const SHEET_NAME = "Kegiatan";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
        
        const filterKelas = document.getElementById("filterKelas");
        const filterBulan = document.getElementById("filterBulan");
        const filterTanggal = document.getElementById("filterTanggal");
        const filterStatus = document.getElementById("filterStatus");
        const resetBtn = document.getElementById("resetFilters");
        const tableBody = document.querySelector("#kegiatanTable tbody");
        let allData = [];

        function parseCSV(csvText) {
            const rows = []; let currentRow = []; let inQuotes = false; let currentValue = "";
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { currentRow.push(currentValue.trim()); currentValue = ""; }
                else if (char === '\n' && !inQuotes) { currentRow.push(currentValue.trim()); rows.push(currentRow); currentRow = []; currentValue = ""; }
                else currentValue += char;
            }
            if (currentValue.trim() !== "") { currentRow.push(currentValue.trim()); rows.push(currentRow); }
            return rows;
        }

        function convertToISODate(dateStr) {
            if (!dateStr) return "";
            const parts = dateStr.split("/");
            if (parts.length === 3) return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            return "";
        }

        function getMonthFromISODate(isoDate) { return isoDate ? isoDate.split("-")[1] : ""; }

        function getDayName(dateStr) {
            if (!dateStr) return "";
            const parts = dateStr.split("/");
            if (parts.length === 3) {
                const dateObj = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
                return dateObj.toLocaleDateString("id-ID", { weekday: "long" });
            }
            return "";
        }

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const csv = await response.text();
                const rows = parseCSV(csv);
                allData = rows.slice(1).filter(r => r.length >= 9 && r[0]).map(row => {
                    const originalDate = row[2].replace(/^"|"$/g, "");
                    return {
                        kelas: row[0].replace(/^"|"$/g, ""),
                        jam: row[1].replace(/^"|"$/g, ""),
                        tanggal: originalDate,
                        tanggalISO: convertToISODate(originalDate),
                        bulan: getMonthFromISODate(convertToISODate(originalDate)),
                        topik: row[3].replace(/^"|"$/g, ""),
                        aktivitas: row[4].replace(/^"|"$/g, ""),
                        target: row[6].replace(/^"|"$/g, ""),
                        status: row[7].replace(/^"|"$/g, "").toLowerCase(),
                        keterangan: row[8].replace(/^"|"$/g, "")
                    };
                }).sort((a, b) => new Date(b.tanggalISO) - new Date(a.tanggalISO));
                renderTable(allData);
                fillDropdowns(allData);
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:red;">Failed to load data.</td></tr>`;
            }
        }

        function renderTable(data) {
            tableBody.innerHTML = "";
            if (!data.length) { tableBody.innerHTML = `<tr><td colspan="9" style="text-align:center;">No data found.</td></tr>`; return; }
            data.forEach(item => {
                const tr = document.createElement("tr");
                tr.classList.add('kelas-' + item.kelas.replace(/\W/g, ''));
                const statusBadge = item.status.includes("selesai") 
                    ? '<span class="status-badge status-selesai"><i class="fa-solid fa-check-circle"></i> Selesai</span>'
                    : '<span class="status-badge status-proses"><i class="fa-solid fa-clock"></i> Proses</span>';
                tr.innerHTML = `
                    <td><span class="badge-kelas">${item.kelas}</span></td>
                    <td>${item.jam}</td><td>${item.tanggal}</td><td>${getDayName(item.tanggal)}</td>
                    <td style="font-weight:500; color:var(--primary);">${item.topik}</td>
                    <td>${item.aktivitas}</td><td>${item.target}</td><td>${statusBadge}</td>
                    <td style="color:var(--text-muted); font-size:0.8rem;">${item.keterangan}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function fillDropdowns(data) {
            const kelasSet = new Set(data.map(i => i.kelas).filter(Boolean));
            filterKelas.innerHTML = '<option value="">All Classes</option>';
            Array.from(kelasSet).sort().forEach(k => { filterKelas.innerHTML += `<option value="${k}">${k}</option>`; });
        }

        function filterTable() {
            const filtered = allData.filter(item => {
                const kelasMatch = !filterKelas.value || item.kelas.toLowerCase().includes(filterKelas.value.toLowerCase());
                const bulanMatch = !filterBulan.value || item.bulan === filterBulan.value;
                const tanggalMatch = !filterTanggal.value || item.tanggalISO === filterTanggal.value;
                const statusMatch = !filterStatus.value || item.status.includes(filterStatus.value);
                return kelasMatch && bulanMatch && tanggalMatch && statusMatch;
            });
            renderTable(filtered);
        }

        filterKelas.addEventListener("change", filterTable);
        filterBulan.addEventListener("change", filterTable);
        filterTanggal.addEventListener("change", filterTable);
        filterStatus.addEventListener("change", filterTable);
        resetBtn.addEventListener("click", () => {
            filterKelas.value = ""; filterBulan.value = ""; filterTanggal.value = ""; filterStatus.value = "";
            renderTable(allData);
        });

        loadData();
    </script>
</body>
</html>
